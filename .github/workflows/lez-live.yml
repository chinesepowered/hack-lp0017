name: LEZ live-stack demo

on:
  workflow_dispatch:
  push:
    branches: [main, "claude/**"]
    paths:
      - packages/registry-program/**
      - scripts/demo.sh
      - scripts/benchmark.sh
      - .github/workflows/lez-live.yml

env:
  CARGO_TERM_COLOR: always
  RISC0_DEV_MODE: "0"
  LOGOS_BLOCKCHAIN_CIRCUITS_VERSION: "v0.4.2"
  LOGOS_BLOCKCHAIN_RELEASE: "0.1.2"

jobs:
  lez-demo:
    name: Build registry + deploy + demo (LEZ devnet)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        run: |
          rustup toolchain install stable
          rustup default stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: lez-live
          cache-on-failure: true

      - name: Download logos-blockchain-circuits
        run: |
          CIRCUITS_URL="https://github.com/logos-blockchain/logos-blockchain/releases/download/${LOGOS_BLOCKCHAIN_RELEASE}/logos-blockchain-circuits-${LOGOS_BLOCKCHAIN_CIRCUITS_VERSION}-linux-x86_64.tar.gz"
          echo "Downloading circuits from $CIRCUITS_URL"
          curl -fsSL "$CIRCUITS_URL" -o /tmp/circuits.tar.gz
          mkdir -p "$HOME/.logos-blockchain-circuits"
          tar xzf /tmp/circuits.tar.gz -C "$HOME/.logos-blockchain-circuits" --strip-components=1 || \
            tar xzf /tmp/circuits.tar.gz -C "$HOME/.logos-blockchain-circuits"
          ls -la "$HOME/.logos-blockchain-circuits/"
          echo "LOGOS_BLOCKCHAIN_CIRCUITS=$HOME/.logos-blockchain-circuits" >> $GITHUB_ENV

      - name: Install RISC0 toolchain
        run: |
          curl -L https://risczero.com/install | bash
          echo "$HOME/.risc0/bin" >> $GITHUB_PATH
          export PATH="$HOME/.risc0/bin:$PATH"
          rzup install

      - name: Install logos-scaffold
        run: cargo install --git https://github.com/logos-co/logos-scaffold

      - name: Install spel CLI
        run: cargo install --git https://github.com/logos-co/spel spel

      - name: Pre-seed spel cache (workaround for logos-scaffold pin)
        run: |
          SPEL_PIN="ed3bbedb4b684645da05455d30a4a0be7cc4dfe0"
          CACHE_DIR="$HOME/.cache/logos-scaffold/repos/spel/$SPEL_PIN"
          mkdir -p "$CACHE_DIR"
          git clone https://github.com/logos-co/spel.git "$CACHE_DIR"
          cd "$CACHE_DIR"
          git fetch origin "$SPEL_PIN" && git checkout "$SPEL_PIN" || \
            (git fetch --unshallow 2>/dev/null; git fetch origin "$SPEL_PIN" && git checkout "$SPEL_PIN")

      - name: Scaffold project + boot local sequencer
        run: |
          cd /tmp
          logos-scaffold create whistleblower-devnet
          cd whistleblower-devnet
          logos-scaffold setup
          logos-scaffold localnet start --timeout-sec 30
          sleep 5
          echo "NSSA_WALLET_HOME_DIR=$PWD/.scaffold/wallet" >> $GITHUB_ENV
          echo "SCAFFOLD_DIR=/tmp/whistleblower-devnet" >> $GITHUB_ENV

      - name: Build registry program (RISC0 guest)
        working-directory: packages/registry-program
        run: make build

      - name: Generate IDL
        working-directory: packages/registry-program
        run: make idl

      - name: Deploy registry to live LEZ sequencer
        working-directory: packages/registry-program
        run: |
          set +e
          BIN="$PWD/methods/guest/target/riscv32im-risc0-zkvm-elf/docker/whistleblower_registry.bin"
          if [ ! -f "$BIN" ]; then
            BIN="$PWD/methods/guest/target/riscv32im-risc0-zkvm-elf/release/whistleblower_registry.bin"
          fi
          echo "Deploying guest ELF: $BIN"
          ls -la "$BIN" || true
          # logos-scaffold deploy locates the wallet binary, signs with the
          # default seeded account, submits to the running sequencer, and
          # prints program_id (computed via `spel inspect`) as JSON.
          cd "$SCAFFOLD_DIR"
          logos-scaffold deploy --program-path "$BIN" --json > /tmp/deploy.log 2>&1
          rc=$?
          echo "--- deploy.log (exit $rc) ---"
          cat /tmp/deploy.log
          echo "--- end deploy.log ---"
          PROGRAM_ID=$(grep -oE '"program_id"[[:space:]]*:[[:space:]]*"[a-f0-9]+"' /tmp/deploy.log | grep -oE '[a-f0-9]{16,}' | head -1)
          if [ -z "$PROGRAM_ID" ]; then
            PROGRAM_ID=$(grep -oE '[a-f0-9]{64}' /tmp/deploy.log | head -1)
          fi
          echo "WHISTLEBLOWER_PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_ENV
          echo "Deployed program_id=$PROGRAM_ID"
          # Anchorer = first public account seeded into the scaffold wallet.
          WC="$NSSA_WALLET_HOME_DIR/wallet_config.json"
          ANCHORER=$(jq -r '.initial_accounts[]? | select(.Public) | .Public.account_id' "$WC" 2>/dev/null | head -1)
          echo "ANCHORER=$ANCHORER" >> $GITHUB_ENV
          echo "Anchorer=$ANCHORER"

      - name: Run end-to-end demo (best-effort LEZ, MOCK fallback)
        run: |
          set +e
          if [ -n "$WHISTLEBLOWER_PROGRAM_ID" ]; then
            echo "Attempting LEZ-mode demo (program_id=$WHISTLEBLOWER_PROGRAM_ID)"
            MODE=LEZ bash scripts/demo.sh > /tmp/demo-output.txt 2>&1
            rc=$?
            cat /tmp/demo-output.txt
            if [ $rc -ne 0 ]; then
              echo "LEZ demo exited $rc — falling back to MOCK"
              bash scripts/demo.sh > /tmp/demo-output.txt 2>&1
              cat /tmp/demo-output.txt
            fi
          else
            echo "No program_id — running MOCK demo"
            bash scripts/demo.sh > /tmp/demo-output.txt 2>&1
            cat /tmp/demo-output.txt
          fi

      - name: Run CU benchmark (best-effort LEZ, MOCK fallback)
        run: |
          set +e
          if [ -n "$WHISTLEBLOWER_PROGRAM_ID" ] && [ -n "$ANCHORER" ]; then
            echo "Attempting LEZ-mode benchmark"
            MODE=LEZ bash scripts/benchmark.sh > /tmp/benchmark-output.txt 2>&1
            rc=$?
            cat /tmp/benchmark-output.txt
            if [ $rc -ne 0 ]; then
              echo "LEZ benchmark exited $rc — falling back to MOCK"
              bash scripts/benchmark.sh > /tmp/benchmark-output.txt 2>&1
              cat /tmp/benchmark-output.txt
            fi
          else
            echo "No program_id/anchorer — running MOCK benchmark"
            bash scripts/benchmark.sh > /tmp/benchmark-output.txt 2>&1
            cat /tmp/benchmark-output.txt
          fi

      - name: Upload demo + benchmark output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lez-live-output
          path: |
            /tmp/demo-output.txt
            /tmp/benchmark-output.txt
            docs/BENCHMARKS.md
            packages/registry-program/.registry-state

      - name: Print summary
        if: always()
        run: |
          echo "## LEZ Live Demo Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- RISC0_DEV_MODE: $RISC0_DEV_MODE" >> $GITHUB_STEP_SUMMARY
          echo "- Program ID: ${WHISTLEBLOWER_PROGRAM_ID:-unknown}" >> $GITHUB_STEP_SUMMARY
          echo "- Anchorer: ${ANCHORER:-unknown}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -20 /tmp/demo-output.txt 2>/dev/null || echo "demo output not available"
          echo '```' >> $GITHUB_STEP_SUMMARY
